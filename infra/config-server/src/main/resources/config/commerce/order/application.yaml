server:
  port: 0

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/commerce?currentSchema=orders
    username: commerce
    password: commerce
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  sql:
    init:
      mode: always

eureka:
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP_ADDRESS:127.0.0.1}
    instance-id: "${spring.application.name}:${random.value}"
    lease-renewal-interval-in-seconds: 10