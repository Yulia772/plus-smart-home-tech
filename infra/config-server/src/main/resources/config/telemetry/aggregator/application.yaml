spring:
  application:
    name: aggregator

aggregator:
  kafka:
    bootstrap-servers: localhost:9092
    topic:
      sensors: telemetry.sensors.v1
      snapshots: telemetry.snapshots.v1
    consumer:
      group-id: aggregator-group

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/